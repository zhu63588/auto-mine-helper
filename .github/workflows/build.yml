name: Build Minecraft Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 检出代码
      uses: actions/checkout@v4

    - name: 设置 JDK 8
      uses: actions/setup-java@v4
      with:
        java-version: '8'
        distribution: 'temurin'

    - name: 下载 Gradle
      run: wget https://services.gradle.org/distributions/gradle-4.9-bin.zip && unzip gradle-4.9-bin.zip

    - name: 使用 Gradle 构建
      run: ./gradle-4.9/bin/gradle build --no-daemon

    - name: 上传构建产物
      uses: actions/upload-artifact@v4
      with:
        name: auto-mine-helper-jar
        path: build/libs/*.jar
        retention-days: 30
